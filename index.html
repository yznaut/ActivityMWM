<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist Manager - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box" id="signInBox">
            <h1 class="auth-title">Sign In</h1>
            <form id="signInForm">
                <div class="input-group">
                    <input type="text" id="signInUsername" placeholder="Username" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="signInPassword" placeholder="Password" required>
                    <span class="password-toggle" onclick="togglePassword('signInPassword', this)">
                        <!-- Eye SLASHED (password is currently HIDDEN) - matches screenshot design -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <p class="auth-switch">Don't have an account? <a href="#" onclick="showSignUp()">Sign Up</a></p>
        </div>

        <div class="auth-box hidden" id="signUpBox">
            <h1 class="auth-title">Sign Up</h1>
            <form id="signUpForm">
                <div class="input-group">
                    <input type="text" id="signUpUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="text" id="signUpEmail" placeholder="Email" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="signUpPassword" placeholder="Password" required>
                    <span class="password-toggle" onclick="togglePassword('signUpPassword', this)">
                        <!-- Eye SLASHED (password is currently HIDDEN) -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="signUpConfirmPassword" placeholder="Confirm Password" required>
                    <span class="password-toggle" onclick="togglePassword('signUpConfirmPassword', this)">
                        <!-- Eye SLASHED (password is currently HIDDEN) -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
                <p class="password-hint">Min 8 chars, atleast 1 number & symbol (!@#$)</p>
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="#" onclick="showSignIn()">Sign In</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
